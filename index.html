<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOULOUIZ IMAD | Digital Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --white: #ffffff;
            --bg: #030712;
            --glass: rgba(15, 23, 42, 0.9);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            20% {
                left: 100%;
            }

            100% {
                left: 100%;
            }
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #030712, #1e1b4b, #1e293b, #030712);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--white);
            min-height: 100vh;
            display: block;
            /* Fixed display for better scrolling */
            overflow-x: hidden;
            overflow-y: auto;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px 20px;
            position: relative;
        }

        /* Decorative Background Blobs */
        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
            background: var(--secondary);
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: var(--accent);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 420px;
            border-radius: 40px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glass-border);
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-25deg);
            animation: shine 8s infinite;
        }

        .logo-top {
            width: 100px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3));
            display: block;
        }

        .profile-img-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 800;
            border: 4px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: -1px;
        }

        .title {
            font-size: 1rem;
            color: var(--secondary);
            margin-bottom: 30px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .bio {
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 35px;
            line-height: 1.6;
            font-weight: 400;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .link-btn svg {
            width: 22px;
            height: 22px;
            color: var(--secondary);
        }

        .security-box {
            margin-top: 40px;
            padding: 20px;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(245, 158, 11, 0.15);
            text-align: left;
        }

        .security-box strong {
            color: var(--accent);
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .security-box p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #475569;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            .main-wrapper {
                padding: 40px 15px;
            }

            .card {
                padding: 40px 25px;
                border-radius: 30px;
            }

            .name {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

        </div>
    </div>

</body>
